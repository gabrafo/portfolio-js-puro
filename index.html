<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio - Seletor de Versoes</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --text: #e5e7eb;
      --muted: #cbd5e1;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --border: #334155;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top, #1e293b 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: 100%;
      max-width: 720px;
      background: color-mix(in srgb, var(--panel) 90%, black 10%);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.6rem;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .actions {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .link-btn {
      display: inline-block;
      text-decoration: none;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #ffffff;
      font-weight: 600;
      border-radius: 8px;
      padding: 10px 14px;
      transition: background-color 0.2s ease;
    }

    .link-btn:hover,
    .link-btn:focus {
      background: var(--accent-hover);
      outline: none;
    }

    .small {
      margin-top: 16px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <main role="main" aria-labelledby="titulo-principal">
    <h1 id="titulo-principal">Selecionar Versão do Portfolio</h1>
    <p>Escolha uma versão para abrir em nova aba.</p>

    <div class="actions" aria-label="Links para as versões do portfólio">
      <a class="link-btn" href="./versao-bootstrap/index.html" target="_blank" rel="noopener noreferrer" aria-label="Abrir versão Bootstrap em nova aba">
        Abrir versão Bootstrap
      </a>
      <a class="link-btn" href="./versao-tailwind/index.html" target="_blank" rel="noopener noreferrer" aria-label="Abrir versão Tailwind em nova aba">
        Abrir versão Tailwind
      </a>
    </div>
  </main>
</body>
</html>
